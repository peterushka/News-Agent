name: Manual Rebuild Test

on:
  workflow_dispatch:
    inputs:
      max_articles:
        description: '每个源最多获取的文章数'
        required: false
        default: '200'
      category:
        description: '可选：只重建单一分类（AI / Technology / Finance）'
        required: false
        default: ''
      no_ai_filter:
        description: '是否关闭 AI 筛选'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install feedparser requests python-dateutil lxml

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Show environment
        run: |
          echo "=== Manual rebuild ==="
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Beijing: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "max_articles=${{ github.event.inputs.max_articles }}"
          echo "category=${{ github.event.inputs.category }}"
          echo "no_ai_filter=${{ github.event.inputs.no_ai_filter }}"
          ls -la

      - name: Build cumulative news
        env:
          MAX_ARTICLES: ${{ github.event.inputs.max_articles || '200' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/build_cumulative_news.py --max-articles ${MAX_ARTICLES}

      - name: Build RSS feeds
        env:
          NEWS_AGENT_BASE_URL: https://peterushka.github.io/News-Agent
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.no_ai_filter }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --no-ai-filter"
          fi
          if [ -n "${{ github.event.inputs.category }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --category '${{ github.event.inputs.category }}'"
          fi
          eval python scripts/build_cumulative_feed.py $EXTRA_ARGS

      - name: Check for changes
        id: changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            git status --porcelain
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changed.outputs.changed == 'true'
        run: |
          BEIJING_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          git add .
          git commit -m "🔧 手动重建 RSS (北京时间: $BEIJING_TIME)"
          git push

      - name: Prepare Pages site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          if [ -d outputs ]; then
            cp -r outputs _site/outputs
          fi
          if [ -d data ]; then
            cp -r data _site/data
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
