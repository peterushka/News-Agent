<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News Agent</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b1020;
      --card: #121932;
      --muted: #8fa1c7;
      --text: #ecf2ff;
      --accent: #6ea8fe;
      --border: #243056;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .sub {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0 20px;
    }
    .links a, .tabs button {
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      font-size: 14px;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0;
    }
    .tabs button.active {
      background: var(--accent);
      color: #081225;
      border-color: var(--accent);
      font-weight: 600;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 18px;
    }
    .list {
      display: grid;
      gap: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
    }
    .card a.title {
      color: var(--text);
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.5;
    }
    .card a.title:hover {
      color: var(--accent);
    }
    .row {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }
    .empty {
      color: var(--muted);
      padding: 18px 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>News Agent</h1>
    <div class="sub">
      一个可直接在 GitHub Pages 查看的新闻聚合页面。当前页面从仓库内已生成的 RSS 文件读取数据，展示 AI、Technology、Finance、游戏+直播、中国互联网 五个频道的最新新闻。
    </div>

    <div class="links">
      <a href="https://github.com/peterushka/News-Agent" target="_blank" rel="noreferrer">GitHub 仓库</a>
      <a href="./outputs/feed/aifreenewsagent.xml" target="_blank" rel="noreferrer">AI RSS</a>
      <a href="./outputs/feed/technologyfreenewsagent.xml" target="_blank" rel="noreferrer">Technology RSS</a>
      <a href="./outputs/feed/financefreenewsagent.xml" target="_blank" rel="noreferrer">Finance RSS</a>
    </div>

    <div class="meta" id="meta">数据来源：仓库内 outputs/feed/*.xml；最后更新时间：加载中...；文章数：-</div>

    <div class="tabs" id="tabs"></div>
    <div class="list" id="list"><div class="empty">正在加载 RSS...</div></div>
  </div>

  <script>
    const FEEDS = {
      AI: './outputs/feed/aifreenewsagent.xml',
      Technology: './outputs/feed/technologyfreenewsagent.xml',
      Finance: './outputs/feed/financefreenewsagent.xml'
    };

    const EXTRA_CHANNELS = {
      '游戏+直播': {
        keywords: ['游戏', '电竞', '直播', '主播', '赛事', 'game', 'gaming', 'esports', 'livestream', 'streaming']
      },
      '中国互联网': {
        keywords: ['中国互联网', '平台', '腾讯', '阿里', '字节', '京东', '美团', '小红书', '快手', 'b站', '斗鱼', '虎牙', 'internet', 'china tech', 'china internet', 'platform']
      }
    };

    const tabsEl = document.getElementById('tabs');
    const listEl = document.getElementById('list');
    const metaEl = document.getElementById('meta');

    let allItems = [];
    let activeTab = 'AI';

    function parseRSS(xmlText, feedName) {
      const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
      const channel = doc.querySelector('channel');
      const buildDate = channel?.querySelector('lastBuildDate')?.textContent || '';
      const items = Array.from(doc.querySelectorAll('item')).map(item => ({
        feed: feedName,
        title: item.querySelector('title')?.textContent?.trim() || '(无标题)',
        link: item.querySelector('link')?.textContent?.trim() || '#',
        pubDate: item.querySelector('pubDate')?.textContent?.trim() || '',
        category: item.querySelector('category')?.textContent?.trim() || feedName,
        description: item.querySelector('description')?.textContent?.replace(/<!\[CDATA\[|\]\]>/g, '').trim() || ''
      }));
      return { buildDate, items };
    }

    function normalizeDate(value) {
      const t = new Date(value).getTime();
      return Number.isFinite(t) ? t : 0;
    }

    function matchExtraChannel(item, channelName) {
      const rule = EXTRA_CHANNELS[channelName];
      if (!rule) return false;
      const text = `${item.title} ${item.description} ${item.feed} ${item.category}`.toLowerCase();
      return rule.keywords.some(k => text.includes(String(k).toLowerCase()));
    }

    function filterItems(tab) {
      if (FEEDS[tab]) {
        return allItems.filter(item => item.feed === tab);
      }
      if (EXTRA_CHANNELS[tab]) {
        return allItems.filter(item => matchExtraChannel(item, tab));
      }
      return allItems;
    }

    function renderTabs() {
      const tabs = [...Object.keys(FEEDS), ...Object.keys(EXTRA_CHANNELS)];
      tabsEl.innerHTML = tabs.map(tab =>
        `<button class="${tab === activeTab ? 'active' : ''}" data-tab="${tab}">${tab}</button>`
      ).join('');
      tabsEl.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          activeTab = btn.dataset.tab;
          renderTabs();
          renderList();
        });
      });
    }

    function renderList() {
      const items = filterItems(activeTab).sort((a, b) => normalizeDate(b.pubDate) - normalizeDate(a.pubDate));
      metaEl.textContent = `数据来源：仓库内 outputs/feed/*.xml；当前频道：${activeTab}；文章数：${items.length}`;

      if (!items.length) {
        listEl.innerHTML = '<div class="empty">当前频道暂无匹配内容。</div>';
        return;
      }

      listEl.innerHTML = items.map(item => `
        <div class="card">
          <a class="title" href="${item.link}" target="_blank" rel="noreferrer">${item.title}</a>
          <div class="row">
            <span class="badge">${item.feed}</span>
            <span class="badge">${item.category}</span>
            ${item.pubDate ? `<span>${item.pubDate}</span>` : ''}
          </div>
        </div>
      `).join('');
    }

    async function loadFeeds() {
      try {
        const entries = await Promise.all(Object.entries(FEEDS).map(async ([name, url]) => {
          const res = await fetch(url, { cache: 'no-store' });
          const text = await res.text();
          return [name, parseRSS(text, name)];
        }));

        let latestBuild = '';
        allItems = [];
        for (const [name, data] of entries) {
          if (data.buildDate && normalizeDate(data.buildDate) > normalizeDate(latestBuild)) {
            latestBuild = data.buildDate;
          }
          allItems.push(...data.items);
        }

        renderTabs();
        renderList();
        if (latestBuild) {
          metaEl.textContent = `数据来源：仓库内 outputs/feed/*.xml；最后更新时间：${latestBuild}；当前频道：${activeTab}；文章数：${filterItems(activeTab).length}`;
        }
      } catch (err) {
        console.error(err);
        listEl.innerHTML = '<div class="empty">加载失败，请稍后刷新重试。</div>';
        metaEl.textContent = '数据来源：仓库内 outputs/feed/*.xml；加载失败';
      }
    }

    loadFeeds();
  </script>
</body>
</html>
