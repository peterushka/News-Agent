<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Agent</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121a2b;
      --card-2: #18233a;
      --text: #e8eefc;
      --muted: #9fb0d0;
      --accent: #8b5cf6;
      --accent-2: #22c55e;
      --border: #26324d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #0f172a 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 36px;
      line-height: 1.1;
    }
    .sub {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
      max-width: 760px;
    }
    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover { background: var(--card-2); }
    .panel {
      background: rgba(18, 26, 43, 0.88);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 18px;
      backdrop-filter: blur(8px);
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 16px 0 6px;
    }
    .tab {
      cursor: pointer;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
    }
    .tab.active {
      background: rgba(139, 92, 246, 0.18);
      color: #fff;
      border-color: rgba(139, 92, 246, 0.5);
    }
    .status {
      font-size: 14px;
      color: var(--muted);
      margin-top: 10px;
    }
    .feed-title {
      font-size: 22px;
      margin: 8px 0 6px;
    }
    .feed-desc {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 6px;
    }
    .list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }
    .item {
      display: block;
      padding: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: 0.2s ease;
    }
    .item:hover {
      transform: translateY(-1px);
      background: var(--card-2);
    }
    .item-title {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 8px;
    }
    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.12);
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, 0.24);
      font-size: 12px;
    }
    .empty {
      color: var(--muted);
      padding: 18px 4px;
    }
    @media (max-width: 760px) {
      .hero { flex-direction: column; }
      h1 { font-size: 30px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div>
        <h1>News Agent</h1>
        <div class="sub">
          一个可直接在 GitHub Pages 查看的新闻聚合页面。当前页面从仓库内已生成的 RSS 文件读取数据，展示 AI、Technology、Finance 三个频道的最新新闻。
        </div>
      </div>
      <div class="top-actions">
        <a class="btn" href="https://github.com/peterushka/News-Agent" target="_blank" rel="noreferrer">GitHub 仓库</a>
        <a class="btn" href="./outputs/feed/aifreenewsagent.xml" target="_blank">AI RSS</a>
        <a class="btn" href="./outputs/feed/technologyfreenewsagent.xml" target="_blank">Technology RSS</a>
        <a class="btn" href="./outputs/feed/financefreenewsagent.xml" target="_blank">Finance RSS</a>
      </div>
    </section>

    <section class="panel">
      <div class="meta">
        <span>数据来源：仓库内 `outputs/feed/*.xml`</span>
        <span id="lastUpdated">最后更新时间：加载中...</span>
        <span id="itemCount">文章数：-</span>
      </div>
      <div class="tabs" id="tabs"></div>
      <div class="status" id="status">正在加载 RSS...</div>
    </section>

    <section class="panel">
      <div class="feed-title" id="feedTitle">加载中...</div>
      <div class="feed-desc" id="feedDesc"></div>
      <div class="list" id="newsList"></div>
    </section>
  </div>

  <script>
    const feeds = {
      ai: {
        key: 'ai',
        name: 'AI',
        label: 'AI',
        url: './outputs/feed/aifreenewsagent.xml'
      },
      technology: {
        key: 'technology',
        name: 'Technology',
        label: 'Technology',
        url: './outputs/feed/technologyfreenewsagent.xml'
      },
      finance: {
        key: 'finance',
        name: 'Finance',
        label: 'Finance',
        url: './outputs/feed/financefreenewsagent.xml'
      }
    };

    const state = {
      current: 'technology',
      cache: {}
    };

    const tabsEl = document.getElementById('tabs');
    const statusEl = document.getElementById('status');
    const titleEl = document.getElementById('feedTitle');
    const descEl = document.getElementById('feedDesc');
    const listEl = document.getElementById('newsList');
    const lastUpdatedEl = document.getElementById('lastUpdated');
    const itemCountEl = document.getElementById('itemCount');

    function formatDate(str) {
      if (!str) return '-';
      const d = new Date(str);
      if (Number.isNaN(d.getTime())) return str;
      return d.toLocaleString('zh-CN', { hour12: false });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    async function loadFeed(feedKey) {
      if (state.cache[feedKey]) return state.cache[feedKey];
      const feed = feeds[feedKey];
      const res = await fetch(feed.url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`加载失败：${res.status}`);
      const xmlText = await res.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, 'text/xml');
      const channel = xml.querySelector('channel');
      if (!channel) throw new Error('RSS 格式异常');

      const title = channel.querySelector('title')?.textContent?.trim() || feed.name;
      const description = channel.querySelector('description')?.textContent?.trim() || '';
      const lastBuildDate = channel.querySelector('lastBuildDate')?.textContent?.trim() || '';
      const items = Array.from(channel.querySelectorAll('item')).map(item => ({
        title: item.querySelector('title')?.textContent?.trim() || '(无标题)',
        link: item.querySelector('link')?.textContent?.trim() || '#',
        pubDate: item.querySelector('pubDate')?.textContent?.trim() || '',
        category: item.querySelector('category')?.textContent?.trim() || feed.name,
        description: item.querySelector('description')?.textContent?.trim() || ''
      }));

      const parsed = { title, description, lastBuildDate, items };
      state.cache[feedKey] = parsed;
      return parsed;
    }

    function renderTabs() {
      tabsEl.innerHTML = Object.values(feeds).map(feed => `
        <button class="tab ${feed.key === state.current ? 'active' : ''}" data-key="${feed.key}">${feed.label}</button>
      `).join('');
      tabsEl.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => switchFeed(btn.dataset.key));
      });
    }

    function renderFeed(data) {
      titleEl.textContent = data.title;
      descEl.textContent = data.description || '暂无描述';
      lastUpdatedEl.textContent = `最后更新时间：${formatDate(data.lastBuildDate)}`;
      itemCountEl.textContent = `文章数：${data.items.length}`;

      if (!data.items.length) {
        listEl.innerHTML = '<div class="empty">当前频道暂无文章。</div>';
        return;
      }

      listEl.innerHTML = data.items.map(item => `
        <a class="item" href="${item.link}" target="_blank" rel="noreferrer">
          <div class="item-title">${escapeHtml(item.title)}</div>
          <div class="item-meta">
            <span class="badge">${escapeHtml(item.category)}</span>
            <span>${escapeHtml(formatDate(item.pubDate))}</span>
          </div>
        </a>
      `).join('');
    }

    async function switchFeed(feedKey) {
      state.current = feedKey;
      renderTabs();
      statusEl.textContent = '正在加载 RSS...';
      listEl.innerHTML = '';
      try {
        const data = await loadFeed(feedKey);
        renderFeed(data);
        statusEl.textContent = `当前频道：${feeds[feedKey].label}`;
      } catch (err) {
        titleEl.textContent = '加载失败';
        descEl.textContent = '';
        lastUpdatedEl.textContent = '最后更新时间：-';
        itemCountEl.textContent = '文章数：-';
        listEl.innerHTML = `<div class="empty">${escapeHtml(err.message || '未知错误')}</div>`;
        statusEl.textContent = 'RSS 加载失败';
      }
    }

    renderTabs();
    switchFeed(state.current);
  </script>
</body>
</html>
